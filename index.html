<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>跳转WPS</title>
    <style>
        /* 简单美化，居中按钮 */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f5f5f5;
        }
        .wps-btn {
            padding: 16px 40px;
            font-size: 20px;
            background-color: #ff7d00;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .wps-btn:hover {
            background-color: #e67000;
        }
    </style>
</head>
<body>
    <!-- 点击跳转WPS官网 -->
    <button class="wps-btn" onclick="window.open('https://www.wps.cn/','_blank')">WPS</button>
</body>
</html>
